<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 80%;
            text-align: center;
        }
        th,td{
            font-family: arial,sans-serif;
            border: 1px solid black;
            padding: 6px;
        }
        .header{
            font-family: Arial,sans-serif;
            background-color:#f2f2f2;
        }
    </style>
</head>
<body>
    <table >
        <tr class="header">
            <td>column 1</td>
            <td>column 2</td>
            <td>column 3</td>

        </tr>
        <tr>
            <td rowspan="2">Row 1 <br>cell 1</td>
            <td> Row 1 Cell 2</td>
            <td>Row 1 Cell 3</td>
        </tr>
        <tr>
            
            <td>Row 2 cell 2</td>
            <td>Row 2 cell 3</td>
        </tr>
        <tr>
            <td colspan="3" style="background-color: #e8e8e8;">Row 3 Cell 1</td>
     </tr>
    </table>
</body>
</html>
